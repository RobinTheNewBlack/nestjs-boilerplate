services:
  postgres:
    image: postgres:16-alpine
    container_name: my-first-nestjs-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Admin@Test1234
      POSTGRES_DB: mynestdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
